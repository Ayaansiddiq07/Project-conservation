<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Solar rays -->
  <g stroke="#facc15" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="32" y1="2" x2="32" y2="10"/>
    <line x1="32" y1="54" x2="32" y2="62"/>
    <line x1="2" y1="32" x2="10" y2="32"/>
    <line x1="54" y1="32" x2="62" y2="32"/>
    <line x1="10.8" y1="10.8" x2="16.5" y2="16.5"/>
    <line x1="47.5" y1="47.5" x2="53.2" y2="53.2"/>
    <line x1="53.2" y1="10.8" x2="47.5" y2="16.5"/>
    <line x1="16.5" y1="47.5" x2="10.8" y2="53.2"/>
  </g>
  <!-- Solar circle -->
  <circle cx="32" cy="32" r="18" fill="#facc15" opacity="0.15"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="#facc15" stroke-width="2"/>
  <!-- S letter -->
  <text x="32" y="41" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="28" fill="#facc15">S</text>
</svg>
